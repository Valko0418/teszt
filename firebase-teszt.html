<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Firebase Teszt</title>
<style>
body{font-family:monospace;background:#111;color:#0f0;padding:20px;font-size:14px;}
.ok{color:#0f0;} .err{color:#f44;} .info{color:#ff0;}
#log{white-space:pre-wrap;border:1px solid #333;padding:10px;min-height:200px;}
button{background:#333;color:#0f0;border:1px solid #0f0;padding:8px 20px;font-size:14px;cursor:pointer;margin:5px;}
</style>
</head>
<body>
<h2>🔥 Firebase Kapcsolat Teszt</h2>
<div id="log">Várakozás...\n</div>
<button onclick="runTest()">▶ Teszt Újra</button>
<button onclick="writeTest()">✏️ Írási Teszt</button>

<script>
const log = document.getElementById('log');
function addLog(msg, type='info'){
  const line = document.createElement('div');
  line.className = type;
  line.textContent = new Date().toLocaleTimeString() + ' – ' + msg;
  log.appendChild(line);
  console.log(msg);
}

function loadScript(src){
  return new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src=src;
    s.onload=()=>{addLog('SDK betöltve: '+src.split('/').pop(),'ok');res();}
    s.onerror=()=>{addLog('SDK HIBA: '+src,'err');rej(new Error('Script load fail: '+src));}
    document.head.appendChild(s);
  });
}

async function runTest(){
  log.innerHTML='';
  addLog('Teszt indítása...');
  addLog('URL: '+location.href);
  addLog('Protocol: '+location.protocol);

  try{
    addLog('1. Firebase App SDK betöltése (jsDelivr)...');
    try{
      await loadScript('https://cdn.jsdelivr.net/npm/firebase@10.7.1/firebase-app-compat.min.js');
    }catch(e1){
      addLog('jsDelivr sikertelen, unpkg próba...','info');
      await loadScript('https://unpkg.com/firebase@10.7.1/firebase-app-compat.js');
    }

    addLog('2. Firebase Database SDK betöltése...');
    try{
      await loadScript('https://cdn.jsdelivr.net/npm/firebase@10.7.1/firebase-database-compat.min.js');
    }catch(e2){
      addLog('jsDelivr sikertelen, unpkg próba...','info');
      await loadScript('https://unpkg.com/firebase@10.7.1/firebase-database-compat.js');
    }

    addLog('3. App inicializálása...');
    if(firebase.apps.length===0){
      firebase.initializeApp({
        apiKey: "AIzaSyAcudE4fBAdD5IxRyPHOi0GxIwe7tZRCSA",
        authDomain: "tuzolto-rendszer.firebaseapp.com",
        databaseURL: "https://tuzolto-rendszer-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "tuzolto-rendszer",
        storageBucket: "tuzolto-rendszer.firebasestorage.app",
        messagingSenderId: "483542268965",
        appId: "1:483542268965:web:78009fde4e4d6820c793cc"
      });
    }
    addLog('App inicializálva OK','ok');

    addLog('4. Adatbázis kapcsolat tesztelése...');
    const db = firebase.database();

    addLog('5. .info/connected olvasása...');
    const connSnap = await db.ref('.info/connected').once('value');
    addLog('.info/connected érték: '+JSON.stringify(connSnap.val()), connSnap.val()?'ok':'err');

    addLog('6. Teszt adat olvasása (_test)...');
    const testSnap = await db.ref('_test').once('value');
    addLog('_test olvasás OK, érték: '+JSON.stringify(testSnap.val()),'ok');

    addLog('✅ FIREBASE MŰKÖDIK! Élő szinkron lehetséges.','ok');

  }catch(e){
    addLog('❌ HIBA: '+e.message,'err');
    addLog('Stack: '+e.stack,'err');
  }
}

async function writeTest(){
  try{
    const db = firebase.database();
    addLog('Írási teszt...');
    await db.ref('_test').set({ts: Date.now(), msg: 'teszt'});
    addLog('✅ ÍRÁS SIKERES!','ok');
  }catch(e){
    addLog('❌ ÍRÁSI HIBA: '+e.message,'err');
  }
}

window.onload = runTest;
</script>
</body>
</html>
